<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>tempmail</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #080808;
  --sb:        #0b0b0b;
  --s1:        #0f0f0f;
  --s2:        #141414;
  --b0:        #161616;
  --b1:        #1e1e1e;
  --b2:        #2a2a2a;
  --t1:        #e8e8e8;
  --t2:        #7a7a7a;
  --t3:        #3a3a3a;
  --acc:       #3b82f6;
  --acc-d:     rgba(59,130,246,.08);
  --acc-b:     rgba(59,130,246,.25);
  --ok:        #22c55e;
  --warn:      #f59e0b;
  --err:       #ef4444;
  --mono:      'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
  --sans:      ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --msg-w:     340px;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1)}
body{font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* ═══════════════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar{
  height:48px;display:flex;align-items:center;gap:8px;
  padding:0 12px;background:var(--sb);
  border-bottom:1px solid var(--b0);
  flex-shrink:0;min-width:0;
}

.tb-logo{
  font-family:var(--mono);font-size:12px;font-weight:600;
  letter-spacing:-.2px;color:var(--t1);user-select:none;
  white-space:nowrap;flex-shrink:0;
}
.tb-logo-acc{color:var(--acc)}

/* health dot */
.health{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hdot{
  width:5px;height:5px;border-radius:50%;
  background:var(--t3);flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.hdot.ok{background:var(--ok);box-shadow:0 0 5px var(--ok)}
.hdot.degraded{background:var(--warn);box-shadow:0 0 5px var(--warn)}
.hdot.error{background:var(--err);box-shadow:0 0 5px var(--err)}
.hdot.checking{animation:hblink 1s ease-in-out infinite}
@keyframes hblink{0%,100%{opacity:.15}50%{opacity:.8}}
.htext{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* tab bar */
.tab-bar{
  display:flex;align-items:center;gap:3px;
  flex:1;overflow-x:auto;min-width:0;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}

.tab{
  display:flex;align-items:center;gap:5px;
  padding:4px 9px;border-radius:4px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  font-size:12px;font-family:var(--mono);
  color:var(--t2);
  border:1px solid transparent;
  border-bottom:2px solid transparent;
  transition:background .1s,color .1s;
  max-width:200px;min-width:0;
  user-select:none;
}
.tab:hover{background:var(--s1);color:var(--t1)}
.tab.active{background:var(--acc-d);color:var(--acc);border-bottom-color:var(--acc)}
.tab.all-tab{font-style:italic;color:var(--t3)}
.tab.all-tab.active{color:var(--acc)}

.tab-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--t3);flex-shrink:0;transition:background .3s;
}
.tab-dot.live{background:var(--ok)}

.tab-label{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;min-width:0;outline:none;
}
.tab-label[contenteditable="true"]{
  background:var(--s2);border-radius:2px;padding:0 3px;
  color:var(--t1);cursor:text;min-width:40px;
}

.tab-badge{
  font-size:9px;font-weight:700;
  background:var(--acc);color:#fff;
  border-radius:3px;padding:1px 4px;
  flex-shrink:0;min-width:14px;text-align:center;
}

.tab-x{
  width:14px;height:14px;border:none;background:transparent;
  color:var(--t3);cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;line-height:1;flex-shrink:0;padding:0;
  transition:color .1s,background .1s;
}
.tab-x:hover{color:var(--err);background:rgba(239,68,68,.1)}

/* overflow dropdown */
.tab-overflow{position:relative;flex-shrink:0}
.tab-overflow-btn{
  font-family:var(--mono);font-size:11px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:4px;color:var(--t2);
  padding:3px 8px;cursor:pointer;white-space:nowrap;
  transition:background .1s,color .1s;
}
.tab-overflow-btn:hover{background:var(--b1);color:var(--t1)}
.tab-dropdown{
  position:absolute;top:calc(100% + 4px);right:0;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:4px;min-width:200px;z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,.6);overflow:hidden;
}
.tab-dd-item{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;cursor:pointer;
  font-family:var(--mono);font-size:11px;color:var(--t2);
  transition:background .1s;border-bottom:1px solid var(--b0);
}
.tab-dd-item:last-child{border-bottom:none}
.tab-dd-item:hover{background:var(--b1);color:var(--t1)}
.tab-dd-item.active{color:var(--acc)}
.tab-dd-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* mobile account select */
.tb-mobile-sel{display:none}

/* topbar right controls */
.tb-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.prov-wrap{position:relative;display:flex;gap:4px;align-items:center}
.prov-wrap::after{
  content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:9px;color:var(--t3);pointer-events:none;
}
.prov-sel{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:4px;color:var(--t2);
  font-family:var(--mono);font-size:11px;
  padding:5px 22px 5px 8px;cursor:pointer;
  appearance:none;outline:none;
  transition:border-color .1s;min-width:60px;max-width:120px;
}
.prov-sel:focus{border-color:var(--acc-b)}
.prov-sel option{background:var(--s2)}
.btn-new{
  font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.2px;
  background:var(--acc);color:#fff;
  border:none;border-radius:4px;
  padding:5px 12px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:background .12s,opacity .12s;
}
.btn-new:hover{background:#2563eb}
.btn-new:active{background:#1d4ed8}
.btn-new:disabled{opacity:.35;cursor:not-allowed}
.btn-new .spin-dot{
  display:inline-block;width:8px;height:8px;
  border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:rot .5s linear infinite;
  vertical-align:middle;margin-right:5px;
}
@keyframes rot{to{transform:rotate(360deg)}}

.ibtn{
  width:22px;height:22px;border:none;background:transparent;
  color:var(--t3);cursor:pointer;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .1s,background .1s;
}
.ibtn:hover{color:var(--t1);background:var(--s2)}
.ibtn.on{color:var(--acc)}

/* ═══════════════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════════════ */
.content{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}

/* ═══════════════════════════════════════════════
   MSG PANEL
═══════════════════════════════════════════════ */
.msg-panel{
  width:var(--msg-w);flex-shrink:0;
  background:var(--sb);border-right:1px solid var(--b0);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .2s ease;
}

.mp-header{
  display:flex;align-items:center;gap:4px;
  padding:8px 10px 6px;border-bottom:1px solid var(--b0);flex-shrink:0;
}
.mp-title{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;
  color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mp-title.copyable{cursor:pointer;transition:color .1s}
.mp-title.copyable:hover{color:var(--acc)}
.mp-title.flash{color:var(--ok) !important}

.msg-list{flex:1;overflow-y:auto;padding:4px 6px 8px}

/* section labels */
.sec{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;
  color:var(--t3);padding:10px 14px 5px;flex-shrink:0;
}

/* pinned */
.pin-hdr{display:flex;align-items:center;gap:5px;color:var(--acc);flex-shrink:0}
.pin-list{flex-shrink:0}
.pin-row{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;cursor:pointer;
  border-bottom:1px solid var(--b0);transition:background .1s;
}
.pin-row:hover{background:var(--acc-d)}
.pin-row.in-session{cursor:default;opacity:.5}
.pin-row.in-session:hover{background:transparent}
.pin-icon{color:var(--acc);flex-shrink:0;display:flex;align-items:center}
.pin-prov{
  font-family:var(--mono);font-size:9px;color:var(--t3);
  background:var(--b1);border:1px solid var(--b2);
  border-radius:3px;padding:1px 4px;flex-shrink:0;margin-left:auto;
}
.pinned-on{color:var(--acc) !important}

/* archive */
.arch-hdr{display:flex;align-items:center;gap:4px;color:var(--t3);flex-shrink:0}
.arch-hdr:hover{color:var(--t2)}
.arch-list{overflow-y:auto;flex-shrink:0;max-height:160px}

.acc-row{
  display:flex;align-items:center;gap:6px;
  padding:5px 9px;border-radius:4px;cursor:pointer;
  border:1px solid transparent;transition:background .1s,border-color .1s;min-width:0;
}
.acc-row:hover{background:var(--s1)}
.acc-row.active{background:var(--acc-d);border-color:var(--acc-b)}
.acc-indicator{
  width:5px;height:5px;border-radius:50%;background:var(--t3);
  flex-shrink:0;transition:background .3s;
}
.acc-indicator.live{background:var(--ok)}
.acc-email{
  font-family:var(--mono);font-size:11px;color:var(--t2);
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.acc-count{
  font-family:var(--mono);font-size:9px;font-weight:700;
  background:var(--acc);color:#fff;
  border-radius:3px;padding:1px 4px;flex-shrink:0;
  min-width:14px;text-align:center;
}
.acc-x{
  width:16px;height:16px;border:none;background:transparent;
  color:var(--t3);cursor:pointer;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;flex-shrink:0;transition:color .1s,background .1s;
}
.acc-x:hover{color:var(--err);background:rgba(239,68,68,.08)}
.hist-row .acc-email{color:var(--t3);font-size:10px}
.hist-row:hover .acc-email,.hist-row.active .acc-email{color:var(--t2)}
.hist-row .acc-count{background:var(--b2);color:var(--t3)}

.msg-acct{
  font-family:var(--mono);font-size:9px;color:var(--t3);
  margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* message list */
.empty-inbox{padding:28px 12px;text-align:center}
.empty-art{font-family:var(--mono);font-size:10px;color:var(--t3);opacity:.35;line-height:1.6;margin-bottom:8px}
.empty-hint{font-size:11px;color:var(--t3)}

.msg-row{
  display:flex;align-items:flex-start;gap:4px;
  padding:8px 8px;border-radius:4px;
  cursor:pointer;border:1px solid transparent;
  margin-bottom:1px;transition:background .1s,border-color .1s;
  animation:slideup .13s ease;
}
@keyframes slideup{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row:hover{background:var(--s1)}
.msg-row.active{background:var(--acc-d);border-color:var(--acc-b)}
.msg-row-inner{flex:1;min-width:0}
.msg-from{font-size:12px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-subj{font-size:11px;color:var(--t2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-time{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px}
.msg-dismiss{
  width:16px;height:16px;border:none;background:transparent;
  color:transparent;cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;flex-shrink:0;padding:0;
  transition:color .1s,background .1s;align-self:flex-start;margin-top:1px;
}
.msg-row:hover .msg-dismiss{color:var(--t3)}
.msg-dismiss:hover{color:var(--err) !important;background:rgba(239,68,68,.08)}

/* ═══════════════════════════════════════════════
   VIEW PANEL
═══════════════════════════════════════════════ */
.view-panel{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
}

.v-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
}
.v-empty-logo{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--b1)}
.v-empty-sub{font-size:12px;color:var(--t3)}

.email-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.email-head{padding:20px 28px 16px;border-bottom:1px solid var(--b0);background:var(--sb);flex-shrink:0}
.email-subject{font-size:15px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:14px}
.meta-grid{display:flex;flex-direction:column;gap:5px}
.meta-row{display:flex;align-items:baseline;gap:10px;font-size:12px}
.meta-k{font-family:var(--mono);font-size:10px;color:var(--t3);width:32px;flex-shrink:0}
.meta-v{color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.head-actions{display:flex;align-items:center;gap:6px;margin-top:14px}
.pill{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:100px;
  border:1px solid var(--b2);background:transparent;
  color:var(--t2);cursor:pointer;transition:all .1s;letter-spacing:.2px;
}
.pill:hover{color:var(--t1);background:var(--s1)}
.pill.on{color:var(--acc);border-color:var(--acc-b);background:var(--acc-d)}

/* back button (mobile only) */
.back-btn{
  display:none;align-items:center;gap:4px;
  font-family:var(--mono);font-size:11px;color:var(--acc);
  cursor:pointer;padding:3px 6px;border-radius:4px;
  border:none;background:transparent;
  transition:background .1s;
}
.back-btn:hover{background:var(--acc-d)}

.email-body{flex:1;overflow:auto;position:relative}
.email-iframe{width:100%;border:none;display:block;min-height:200px;background:#fff}
.email-iframe.dark{filter:invert(1) hue-rotate(180deg)}
.email-text{
  padding:24px 28px;font-family:var(--mono);font-size:12px;
  color:var(--t2);white-space:pre-wrap;line-height:1.75;
}
.email-none{padding:24px 28px;font-size:12px;color:var(--t3)}
.email-loading{display:flex;align-items:center;justify-content:center;height:100%;gap:8px;font-size:12px;color:var(--t3)}
.spin-ring{width:14px;height:14px;border:1.5px solid var(--b2);border-top-color:var(--t3);border-radius:50%;animation:rot .6s linear infinite;flex-shrink:0}

/* attachments */
.attach-section{padding:12px 28px 20px;border-top:1px solid var(--b0);flex-shrink:0}
.attach-title{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;
}
.attach-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:4px;
  background:var(--s1);border:1px solid var(--b1);margin-bottom:4px;
}
.attach-icon{color:var(--t3);flex-shrink:0;font-size:13px}
.attach-name{font-family:var(--mono);font-size:11px;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-size{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0}
.attach-dl{
  font-family:var(--mono);font-size:10px;padding:3px 9px;
  border-radius:3px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);cursor:pointer;text-decoration:none;flex-shrink:0;
  transition:background .1s,color .1s;
}
.attach-dl:hover{background:var(--b1);color:var(--t1)}

/* ═══════════════════════════════════════════════
   TOASTS
═══════════════════════════════════════════════ */
.toasts{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:5px;z-index:9999}
.toast{
  font-family:var(--mono);font-size:11px;padding:8px 12px;border-radius:4px;
  background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);max-width:260px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);animation:tin .15s ease;
}
.toast.ok{border-color:rgba(34,197,94,.25);color:var(--ok)}
.toast.err{border-color:rgba(239,68,68,.25);color:var(--err)}
.toast.warn{border-color:rgba(245,158,11,.25);color:var(--warn)}
.toast.out{animation:tout .15s ease forwards}
@keyframes tin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(5px)}}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width:900px){
  :root{--msg-w:280px}
}
@media (max-width:600px){
  :root{--msg-w:100%}
  .tab-bar{display:none}
  .tab-overflow{display:none !important}
  .tb-mobile-sel{display:block !important;flex:1;min-width:0;max-width:160px}
  .prov-wrap::after{display:none}
  .prov-sel{max-width:80px}
  .content{position:relative}
  .msg-panel{
    position:absolute;top:0;left:0;right:0;bottom:0;
    width:100%;z-index:10;
  }
  .msg-panel.hidden{transform:translateX(-100%)}
  .view-panel{
    position:absolute;top:0;left:0;right:0;bottom:0;
    width:100%;z-index:5;
  }
  .view-panel.hidden{display:none}
  .back-btn{display:flex !important}
}
</style>
</head>
<body>
<div class="app">

  <!-- ════════════════ TOPBAR ════════════════ -->
  <div class="topbar">
    <div class="tb-logo">[tempmail<span class="tb-logo-acc">·</span>]</div>
    <div class="health">
      <div class="hdot checking" id="hdot"></div>
      <span class="htext" id="htxt">—</span>
    </div>

    <!-- desktop tab bar -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- mobile account select -->
    <select class="tb-mobile-sel prov-sel" id="mobileAccSel"></select>

    <!-- overflow dropdown -->
    <div class="tab-overflow" id="tabOverflow" style="display:none">
      <button class="tab-overflow-btn" id="tabOverflowBtn" onclick="toggleOverflow()">+0 ▾</button>
      <div class="tab-dropdown" id="tabDropdown" style="display:none"></div>
    </div>

    <!-- provider + new button -->
    <div class="tb-controls">
      <div class="prov-wrap">
        <select class="prov-sel" id="provSel"><option value="">auto</option></select>
        <button class="ibtn" id="provToggleBtn" title="Toggle provider" onclick="onProvToggle()" style="display:none;flex-shrink:0">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </button>
      </div>
      <button class="btn-new" id="genBtn" onclick="generate()">+ New</button>
    </div>
  </div>

  <!-- ════════════════ CONTENT ════════════════ -->
  <div class="content">

    <!-- ════ MSG PANEL ════ -->
    <div class="msg-panel" id="msgPanel">

      <div class="mp-header" id="mpHeader" style="display:none">
        <div class="mp-title" id="mpTitle">Inbox</div>
        <button class="ibtn" id="rfBtn" onclick="refresh()" title="Refresh">
          <svg id="rfIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
        <button class="ibtn" id="autoBtn" onclick="toggleAuto()" title="Auto-refresh">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </div>

      <div class="msg-list" id="msgList"></div>

      <div class="sec pin-hdr" id="pinHdr" style="display:none">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1l-1.5 1.5L16 4l-4 4-3-1-5 5 3 3-3 3h4l2-2 3 3 5-5-1-3 4-4 1.5 1.5L22 8z"/></svg>
        Pinned
      </div>
      <div class="pin-list" id="pinList"></div>

      <div class="sec arch-hdr" id="archHdr" onclick="toggleArchive()" style="display:none;cursor:pointer;user-select:none">
        Archive
        <svg id="archChev" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:auto;transition:transform .15s"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="arch-list" id="archList" style="display:none"></div>

    </div>

    <!-- ════ VIEW PANEL ════ -->
    <main class="view-panel" id="viewer">
      <div class="v-empty">
        <div class="v-empty-logo">[tempmail·]</div>
        <div class="v-empty-sub">Generate a mailbox to get started</div>
      </div>
    </main>

  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
const API = '/api';
const TAB_MAX = 5;

/* ── State ─────────────────────────────────────────────────────────────── */
const S = {
  provider:        '',
  accounts:        [],   // [{email, token, provider, msgs:[]}]
  history:         [],   // [{email, token, provider, archivedAt, msgs:[]}]
  activeIdx:       -1,   // -1 = all accounts
  historyIdx:      -1,   // >= 0 when viewing archived account
  selectedMsgId:   null,
  autoOn:          false,
  autoTimer:       null,
  darkEmail:       false,
  busy:            false,
  _providerStatus: [],
  _pinned:         [],
  _labels:         {},   // {email: displayLabel}
  _dismissed:      {},   // {email: [msgId, ...]}
  _seenIds:        {},   // {email: Set<id>} — in-memory only
  _mobileView:     'list',
};

/* ── Persistence ───────────────────────────────────────────────────────── */
const _EMAIL_RE = /^[^@\s<>]+@[^@\s<>]+\.[^@\s<>]{2,}$/;

function save() {
  localStorage.setItem('tm_accounts', JSON.stringify(
    S.accounts.map(a => ({email:a.email, token:a.token, provider:a.provider}))
  ));
  localStorage.setItem('tm_activeIdx', String(S.activeIdx));
}

function saveHistory() {
  try {
    localStorage.setItem('tm_history', JSON.stringify(
      S.history.slice(0,100).map(h => ({
        email:h.email, token:h.token, provider:h.provider,
        archivedAt:h.archivedAt,
        msgs:(h.msgs||[]).map(m => ({id:m.id,from_addr:m.from_addr,to_addr:m.to_addr,subject:m.subject,created_at:m.created_at}))
      }))
    ));
  } catch {}
}

function saveLabels()    { try { localStorage.setItem('tm_labels',    JSON.stringify(S._labels));    } catch {} }
function saveDismissed() { try { localStorage.setItem('tm_dismissed', JSON.stringify(S._dismissed)); } catch {} }

function saveMsgs(email, msgs) {
  try {
    localStorage.setItem('tm_msgs_' + email, JSON.stringify(
      msgs.map(m => ({id:m.id,from_addr:m.from_addr,to_addr:m.to_addr,subject:m.subject,created_at:m.created_at}))
    ));
  } catch {}
}
function loadMsgs(email) {
  try { return JSON.parse(localStorage.getItem('tm_msgs_' + email) || '[]'); } catch { return []; }
}
function saveBodies(email, map) {
  try { localStorage.setItem('tm_bodies_' + email, JSON.stringify(map)); } catch {}
}
function loadBodies(email) {
  try { return JSON.parse(localStorage.getItem('tm_bodies_' + email) || '{}'); } catch { return {}; }
}
function cleanupMsgStorage(email) {
  localStorage.removeItem('tm_msgs_' + email);
  localStorage.removeItem('tm_bodies_' + email);
}

function restore() {
  try {
    const raw = localStorage.getItem('tm_accounts');
    if (raw) {
      const saved = JSON.parse(raw);
      S.accounts = saved
        .filter(a => a.email && _EMAIL_RE.test(a.email.trim()))
        .map(a => ({...a, msgs: loadMsgs(a.email)}));
      const i = parseInt(localStorage.getItem('tm_activeIdx') || '-1');
      S.activeIdx = S.accounts.length > 0 ? Math.max(-1, Math.min(i, S.accounts.length-1)) : -1;
    }
    try { S.history    = JSON.parse(localStorage.getItem('tm_history')   || '[]'); } catch { S.history = []; }
    try { S._labels    = JSON.parse(localStorage.getItem('tm_labels')    || '{}'); } catch {}
    try { S._dismissed = JSON.parse(localStorage.getItem('tm_dismissed') || '{}'); } catch {}
    save();
  } catch {}
}

/* ── Labels ────────────────────────────────────────────────────────────── */
function getLabel(email) {
  const l = S._labels[email];
  return (l && l.trim()) ? l.trim() : email;
}
function setLabel(email, label) {
  S._labels[email] = label.trim() || email;
  saveLabels();
}

/* ── Health ────────────────────────────────────────────────────────────── */
async function checkHealth() {
  const dot = $('hdot'), txt = $('htxt');
  try {
    const d = await fetch(`${API}/health`).then(r => r.json());
    dot.className = 'hdot ' + (d.healthy ? 'ok' : 'degraded');
    txt.textContent = d.healthy ? 'ok' : 'degraded';
  } catch {
    dot.className = 'hdot error';
    txt.textContent = 'err';
  }
}

/* ── Providers ─────────────────────────────────────────────────────────── */
async function loadProviders() {
  try {
    const list = await fetch(`${API}/providers`).then(r => r.json());
    S._providerStatus = list;
    const sel = $('provSel');
    while (sel.options.length > 1) sel.remove(1);
    list.forEach(p => {
      const o = document.createElement('option');
      o.value = p.name;
      o.textContent = p.disabled ? `${p.name} ✕` : p.failures > 0 ? `${p.name} (${p.failures}×)` : p.name;
      if (p.disabled) o.style.color = 'var(--t3)';
      sel.appendChild(o);
    });
    sel.onchange = () => { S.provider = sel.value; updateProvToggleBtn(); };
    updateProvToggleBtn();
  } catch {}
}

function updateProvToggleBtn() {
  const sel = $('provSel'), btn = $('provToggleBtn'), name = sel.value;
  if (!name || !S._providerStatus.length) { btn.style.display = 'none'; return; }
  const info = S._providerStatus.find(p => p.name === name);
  if (!info) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  btn.title = info.disabled ? `Enable ${name}` : `Disable ${name}`;
  btn.style.color = info.disabled ? 'var(--ok)' : 'var(--err)';
}

async function onProvToggle() {
  const name = $('provSel').value;
  if (!name) return;
  const info = S._providerStatus.find(p => p.name === name);
  if (!info) return;
  await toggleProvider(name, !info.disabled);
  updateProvToggleBtn();
}

async function toggleProvider(name, disable) {
  try {
    await fetch(`${API}/providers/${enc(name)}/${disable?'disable':'enable'}`, {method:'POST'});
    await loadProviders();
    toast(`${name} ${disable?'disabled':'enabled'}`, disable?'warn':'ok');
  } catch { toast('Failed', 'err'); }
}

/* ── Shared / Pinned ───────────────────────────────────────────────────── */
async function loadPinned() {
  try {
    S._pinned = await fetch(`${API}/shared`).then(r => r.json());
    renderPinned();
    renderTabs();
  } catch {}
}

function renderPinned() {
  const hdr = $('pinHdr'), list = $('pinList');
  if (!S._pinned.length) { hdr.style.display = 'none'; list.innerHTML = ''; return; }
  hdr.style.display = '';
  list.innerHTML = '';
  S._pinned.forEach(p => {
    const inSession = S.accounts.some(a => a.email === p.email);
    const row = el('div', 'pin-row' + (inSession ? ' in-session' : ''));
    row.title = inSession ? 'Already in your session' : 'Click to add to your session';
    const icon = el('span', 'pin-icon');
    icon.innerHTML = `<svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1l-1.5 1.5L16 4l-4 4-3-1-5 5 3 3-3 3h4l2-2 3 3 5-5-1-3 4-4 1.5 1.5L22 8z"/></svg>`;
    const addr = el('div', 'acc-email'); addr.textContent = getLabel(p.label || p.email); addr.title = p.email;
    const prov = el('span', 'pin-prov'); prov.textContent = p.provider;
    const xBtn = el('button', 'acc-x'); xBtn.textContent = '×'; xBtn.title = 'Unpin';
    xBtn.onclick = e => { e.stopPropagation(); unpinEmail(p.email); };
    row.appendChild(icon); row.appendChild(addr); row.appendChild(prov); row.appendChild(xBtn);
    if (!inSession) row.onclick = () => addSharedToSession(p);
    list.appendChild(row);
  });
}

async function pinEmail(acctIdx) {
  const acct = S.accounts[acctIdx];
  if (!acct) return;
  try {
    const r = await fetch(`${API}/shared`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:acct.email, token:acct.token, provider:acct.provider}),
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||`HTTP ${r.status}`); }
    await loadPinned();
    toast('Pinned — visible to everyone', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

async function unpinEmail(email) {
  try {
    await fetch(`${API}/shared/${enc(email)}`, {method:'DELETE'});
    await loadPinned();
    toast('Unpinned', 'warn');
  } catch { toast('Failed', 'err'); }
}

function addSharedToSession(p) {
  if (S.accounts.some(a => a.email === p.email)) { toast('Already in session', 'warn'); return; }
  S.accounts.push({email:p.email, token:p.token, provider:p.provider, msgs:loadMsgs(p.email)});
  S.activeIdx = S.accounts.length - 1;
  S.historyIdx = -1; S.selectedMsgId = null;
  save(); renderAll(); toast('Added to session', 'ok');
  refreshAccount(S.activeIdx);
}

/* ── Tabs ──────────────────────────────────────────────────────────────── */
function renderTabs() {
  const bar       = $('tabBar');
  const ovWrap    = $('tabOverflow');
  const ovBtn     = $('tabOverflowBtn');
  const dropdown  = $('tabDropdown');
  const mSel      = $('mobileAccSel');

  bar.innerHTML = '';
  dropdown.innerHTML = '';
  mSel.innerHTML = '';

  // "All" tab
  if (S.accounts.length) {
    const isAll = S.activeIdx === -1 && S.historyIdx === -1;
    const allTab = el('div', 'tab all-tab' + (isAll ? ' active' : ''));
    const dot = el('div', 'tab-dot' + (S.accounts.some(a => a.msgs.length) ? ' live' : ''));
    const lbl = el('span', 'tab-label'); lbl.textContent = 'All';
    allTab.appendChild(dot); allTab.appendChild(lbl);
    const total = S.accounts.reduce((s,a) => {
      const dis = S._dismissed[a.email] || [];
      return s + a.msgs.filter(m => !dis.includes(m.id)).length;
    }, 0);
    if (total) { const b = el('span','tab-badge'); b.textContent = total; allTab.appendChild(b); }
    allTab.onclick = () => { S.activeIdx=-1; S.historyIdx=-1; S.selectedMsgId=null; save(); renderAll(); };
    bar.appendChild(allTab);
    const mo = document.createElement('option'); mo.value='all'; mo.textContent='All accounts';
    if (isAll) mo.selected = true;
    mSel.appendChild(mo);
  }

  const visible  = S.accounts.slice(0, TAB_MAX);
  const overflow = S.accounts.slice(TAB_MAX);

  visible.forEach((acct, i) => _buildTab(bar, acct, i, mSel));

  if (overflow.length) {
    ovWrap.style.display = '';
    ovBtn.textContent = `+${overflow.length} ▾`;
    overflow.forEach((acct, j) => {
      const realIdx = TAB_MAX + j;
      const item = el('div', 'tab-dd-item' + (realIdx === S.activeIdx ? ' active' : ''));
      const dot  = el('div', 'tab-dot' + (acct.msgs.length ? ' live' : ''));
      const lbl  = el('span', 'tab-dd-label'); lbl.textContent = getLabel(acct.email); lbl.title = acct.email;
      const xBtn = el('button', 'acc-x'); xBtn.textContent = '×'; xBtn.title = 'Delete';
      xBtn.onclick = e => { e.stopPropagation(); dropdown.style.display='none'; deleteAccount(realIdx, e); };
      item.appendChild(dot); item.appendChild(lbl); item.appendChild(xBtn);
      item.onclick = () => { dropdown.style.display='none'; selectAccount(realIdx); };
      dropdown.appendChild(item);
      const mo = document.createElement('option'); mo.value = String(realIdx);
      mo.textContent = getLabel(acct.email);
      if (realIdx === S.activeIdx) mo.selected = true;
      mSel.appendChild(mo);
    });
  } else {
    ovWrap.style.display = 'none';
    dropdown.style.display = 'none';
  }

  // Mobile select sync
  if (S.activeIdx === -1 && S.accounts.length) mSel.value = 'all';
  else if (S.activeIdx >= 0) mSel.value = String(S.activeIdx);
  mSel.onchange = () => {
    const v = mSel.value;
    if (v === 'all') { S.activeIdx=-1; S.historyIdx=-1; S.selectedMsgId=null; save(); renderAll(); }
    else selectAccount(parseInt(v));
  };

  updateMpTitle();
}

function _buildTab(bar, acct, i, mSel) {
  const isActive = i === S.activeIdx && S.historyIdx === -1;
  const tab = el('div', 'tab' + (isActive ? ' active' : ''));
  const dot = el('div', 'tab-dot' + (acct.msgs.length ? ' live' : ''));
  const lbl = el('span', 'tab-label');
  lbl.textContent = getLabel(acct.email);
  lbl.title = acct.email;
  lbl.ondblclick = e => { e.stopPropagation(); startLabelEdit(acct.email, lbl); };

  const dismissed = S._dismissed[acct.email] || [];
  const visCount  = acct.msgs.filter(m => !dismissed.includes(m.id)).length;

  tab.appendChild(dot); tab.appendChild(lbl);
  if (visCount) { const b = el('span','tab-badge'); b.textContent = visCount; tab.appendChild(b); }

  const xBtn = el('button', 'tab-x'); xBtn.textContent = '×'; xBtn.title = 'Delete account';
  xBtn.onclick = e => deleteAccount(i, e);
  tab.appendChild(xBtn);
  tab.onclick = () => selectAccount(i);
  bar.appendChild(tab);

  const mo = document.createElement('option'); mo.value = String(i);
  mo.textContent = getLabel(acct.email);
  if (isActive) mo.selected = true;
  mSel.appendChild(mo);
}

function toggleOverflow() {
  const d = $('tabDropdown');
  d.style.display = d.style.display === 'none' ? '' : 'none';
}

document.addEventListener('click', e => {
  const ow = $('tabOverflow');
  if (ow && !ow.contains(e.target)) {
    const d = $('tabDropdown');
    if (d) d.style.display = 'none';
  }
});

function updateMpTitle() {
  const hdr = $('mpHeader'), title = $('mpTitle');
  if (!hdr || !title) return;
  const hasContent = S.accounts.length > 0 || S.historyIdx >= 0;
  hdr.style.display = hasContent ? 'flex' : 'none';

  let copyEmail = null;
  if (S.historyIdx >= 0) {
    const h = S.history[S.historyIdx];
    title.textContent = h ? getLabel(h.email) : 'Archive';
    copyEmail = h ? h.email : null;
  } else if (S.activeIdx === -1 && S.accounts.length) {
    title.textContent = 'All';
  } else if (S.activeIdx >= 0) {
    const acct = S.accounts[S.activeIdx];
    title.textContent = acct ? getLabel(acct.email) : 'Inbox';
    copyEmail = acct ? acct.email : null;
  } else {
    title.textContent = 'Inbox';
  }

  if (copyEmail) {
    title.classList.add('copyable');
    title.title = `Click to copy: ${copyEmail}`;
    title.onclick = () => {
      navigator.clipboard.writeText(copyEmail).then(() => {
        title.classList.add('flash');
        setTimeout(() => title.classList.remove('flash'), 900);
        toast('Copied', 'ok');
      }).catch(() => toast('Clipboard unavailable', 'err'));
    };
  } else {
    title.classList.remove('copyable');
    title.title = '';
    title.onclick = null;
  }
}

/* ── Label edit ────────────────────────────────────────────────────────── */
function startLabelEdit(email, lblEl) {
  lblEl.contentEditable = 'true';
  lblEl.focus();
  const range = document.createRange();
  range.selectNodeContents(lblEl);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);

  function commit() {
    lblEl.contentEditable = 'false';
    setLabel(email, lblEl.textContent.trim() || email);
    lblEl.textContent = getLabel(email);
    renderTabs(); updateMpTitle();
  }
  lblEl.onblur = commit;
  lblEl.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); lblEl.blur(); }
    if (e.key === 'Escape') { lblEl.contentEditable = 'false'; lblEl.textContent = getLabel(email); }
    e.stopPropagation();
  };
}

/* ── Generate ──────────────────────────────────────────────────────────── */
async function generate() {
  if (S.busy) return;
  S.busy = true;
  const btn = $('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-dot"></span>…';
  try {
    const url = S.provider ? `${API}/email?name=${enc(S.provider)}` : `${API}/email`;
    const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      throw new Error(e.detail?.message || e.detail || `HTTP ${r.status}`);
    }
    const acct = await r.json();
    S.accounts.push({...acct, msgs:[]});
    S.activeIdx = S.accounts.length - 1;
    S.historyIdx = -1; S.selectedMsgId = null;
    save(); renderAll(); toast('Mailbox created', 'ok');
    await refreshAccount(S.activeIdx);
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    S.busy = false; btn.disabled = false; btn.textContent = '+ New';
  }
}

/* ── Account actions ───────────────────────────────────────────────────── */
function selectAccount(idx) {
  if (S.activeIdx === idx && S.historyIdx === -1) return;
  S.activeIdx = idx; S.historyIdx = -1; S.selectedMsgId = null;
  save(); renderAll();
}

function selectHistory(idx) {
  if (S.historyIdx === idx) return;
  S.historyIdx = idx; S.activeIdx = -1; S.selectedMsgId = null;
  renderAll();
}

async function deleteAccount(idx, e) {
  e.stopPropagation();
  const acct = S.accounts[idx];
  if (!acct) return;
  try {
    await fetch(`${API}/email/${enc(acct.email)}?token=${enc(acct.token)}&name=${enc(acct.provider)}`, {method:'DELETE'});
  } catch {}
  const msgs = acct.msgs.length ? acct.msgs : loadMsgs(acct.email);
  S.history.unshift({email:acct.email, token:acct.token, provider:acct.provider, archivedAt:Date.now(), msgs});
  if (S.history.length > 100) S.history.pop();
  saveHistory();
  S.accounts.splice(idx, 1);
  if (S.activeIdx >= S.accounts.length) S.activeIdx = S.accounts.length - 1;
  S.historyIdx = -1; S.selectedMsgId = null;
  save(); renderAll(); toast('Mailbox archived');
}

function removeHistory(idx, e) {
  e.stopPropagation();
  const h = S.history[idx];
  if (!h) return;
  cleanupMsgStorage(h.email);
  S.history.splice(idx, 1);
  if (S.historyIdx === idx) { S.historyIdx = -1; S.selectedMsgId = null; }
  else if (S.historyIdx > idx) S.historyIdx--;
  saveHistory(); renderAll(); toast('Removed from archive');
}

/* ── Dismiss message ───────────────────────────────────────────────────── */
function dismissMsg(msgId, email, e) {
  e.stopPropagation();
  if (!S._dismissed[email]) S._dismissed[email] = [];
  if (!S._dismissed[email].includes(msgId)) {
    S._dismissed[email].push(msgId);
    saveDismissed();
  }
  if (S.selectedMsgId === msgId) { S.selectedMsgId = null; renderViewer(); }
  renderMsgList(); renderTabs();
}

/* ── Refresh ───────────────────────────────────────────────────────────── */
async function refreshAccount(idx) {
  const acct = S.accounts[idx];
  if (!acct) return;
  try {
    const r = await fetch(`${API}/email/${enc(acct.email)}/messages?token=${enc(acct.token)}&name=${enc(acct.provider)}`);
    if (!r.ok) return;
    const msgs = await r.json();

    // Notification dedup
    if (!S._seenIds[acct.email]) {
      S._seenIds[acct.email] = new Set(msgs.map(m => m.id));
    } else {
      const newMsgs = msgs.filter(m => !S._seenIds[acct.email].has(m.id));
      if (newMsgs.length) {
        requestNotifPermission();
        newMsgs.forEach(m => { S._seenIds[acct.email].add(m.id); showNotif(m, idx); });
        toast(`+${newMsgs.length} new message${newMsgs.length > 1 ? 's' : ''}`, 'ok');
      }
    }

    acct.msgs = msgs;
    saveMsgs(acct.email, msgs);
    renderTabs();
    if (idx === S.activeIdx && S.historyIdx === -1) renderMsgList();
  } catch {}
}

async function refresh() {
  if (S.busy || !S.accounts.length) return;
  S.busy = true;
  $('rfIcon').classList.add('spin');
  if (S.activeIdx === -1) {
    await Promise.all(S.accounts.map((_, i) => refreshAccount(i)));
  } else {
    await refreshAccount(S.activeIdx);
  }
  S.busy = false;
  $('rfIcon').classList.remove('spin');
}

/* ── Notifications ─────────────────────────────────────────────────────── */
function requestNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();
}

function showNotif(msg, acctIdx) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const acct = S.accounts[acctIdx];
  if (!acct) return;
  try {
    const n = new Notification(getLabel(acct.email), {
      body: (msg.subject || '(no subject)') + '\n' + displayName(msg.from_addr || ''),
      tag: msg.id,
    });
    n.onclick = () => { window.focus(); selectAccount(acctIdx); openMsg(msg.id, acctIdx); };
  } catch {}
}

/* ── Open message ──────────────────────────────────────────────────────── */
async function openMsg(msgId, acctIdx) {
  S.selectedMsgId = msgId;
  renderMsgList();
  const viewer = $('viewer');

  // History mode — load from cache only
  if (S.historyIdx >= 0) {
    const h = S.history[S.historyIdx];
    const meta  = (h.msgs||[]).find(m => m.id === msgId);
    const bodies = loadBodies(h.email);
    const body  = bodies[msgId];
    if (meta && body) {
      renderEmail({...meta, ...body});
    } else if (meta) {
      renderEmail({...meta, body_html:null, body_text:'(body not cached — message was not opened before archiving)', attachments:[]});
    } else {
      viewer.innerHTML = `<div class="email-loading" style="color:var(--t3)">Message not cached</div>`;
    }
    S._mobileView = 'viewer'; applyMobileView();
    return;
  }

  const acct = acctIdx !== undefined
    ? S.accounts[acctIdx]
    : S.accounts[S.activeIdx] ?? S.accounts.find(a => a.msgs.some(m => m.id === msgId));

  viewer.innerHTML = `<div class="email-loading"><div class="spin-ring"></div>loading…</div>`;

  try {
    const r = await fetch(`${API}/email/${enc(acct.email)}/message/${enc(msgId)}?token=${enc(acct.token)}&name=${enc(acct.provider)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const msg = await r.json();
    // Cache body
    const bodies = loadBodies(acct.email);
    bodies[msgId] = {body_html:msg.body_html, body_text:msg.body_text, attachments:msg.attachments||[]};
    saveBodies(acct.email, bodies);
    renderEmail(msg);
    S._mobileView = 'viewer'; applyMobileView();
  } catch(e) {
    viewer.innerHTML = `<div class="email-loading" style="color:var(--err)">${esc(e.message)}</div>`;
  }
}

/* ── Render email ──────────────────────────────────────────────────────── */
function renderEmail(msg) {
  const viewer = $('viewer');
  viewer.innerHTML = '';
  const view = el('div', 'email-view');

  // Header
  const head = el('div', 'email-head');
  const subjectEl = el('div', 'email-subject'); subjectEl.textContent = msg.subject || '(no subject)';
  head.appendChild(subjectEl);

  const metaGrid = el('div', 'meta-grid');
  const toLabel = (() => {
    const acct = S.accounts.find(a => a.email === msg.to_addr);
    return acct ? getLabel(acct.email) : (msg.to_addr || '—');
  })();
  [['From', msg.from_addr], ['To', toLabel], ['Date', fmtDate(msg.created_at)]].forEach(([k, v]) => {
    const row = el('div', 'meta-row');
    const key = el('span', 'meta-k'); key.textContent = k;
    const val = el('span', 'meta-v'); val.textContent = v || '—';
    row.appendChild(key); row.appendChild(val); metaGrid.appendChild(row);
  });
  head.appendChild(metaGrid);

  const actions = el('div', 'head-actions');
  const backBtn = el('button', 'back-btn');
  backBtn.innerHTML = '← Back';
  backBtn.onclick = () => { S._mobileView='list'; applyMobileView(); S.selectedMsgId=null; renderViewer(); };
  const darkBtn = el('button', 'pill' + (S.darkEmail ? ' on' : ''));
  darkBtn.id = 'darkBtn'; darkBtn.textContent = 'dark'; darkBtn.onclick = toggleDark;
  actions.appendChild(backBtn); actions.appendChild(darkBtn);
  head.appendChild(actions);
  view.appendChild(head);

  // Body
  const body = el('div', 'email-body');
  if (msg.body_html) {
    const iframe = document.createElement('iframe');
    iframe.className = 'email-iframe' + (S.darkEmail ? ' dark' : '');
    iframe.id = 'emailFrame';
    iframe.setAttribute('sandbox', 'allow-same-origin');
    const clean = window.DOMPurify
      ? DOMPurify.sanitize(msg.body_html, {USE_PROFILES:{html:true}})
      : msg.body_html;
    iframe.srcdoc = clean;
    iframe.onload = () => {
      try {
        const h = iframe.contentDocument.documentElement.scrollHeight;
        iframe.style.height = Math.max(200, h) + 'px';
      } catch {}
      if (S.darkEmail) injectDarkImages(iframe);
    };
    body.appendChild(iframe);
  } else if (msg.body_text) {
    const pre = el('div', 'email-text'); pre.textContent = msg.body_text; body.appendChild(pre);
  } else {
    const none = el('div', 'email-none'); none.textContent = 'No content.'; body.appendChild(none);
  }
  view.appendChild(body);

  // Attachments
  renderAttachments(msg.attachments || [], view);

  viewer.appendChild(view);
}

function renderAttachments(attachments, container) {
  if (!attachments || !attachments.length) return;
  const section = el('div', 'attach-section');
  const title = el('div', 'attach-title'); title.textContent = 'Attachments';
  section.appendChild(title);
  attachments.forEach(att => {
    const row = el('div', 'attach-row');
    const icon = el('span', 'attach-icon'); icon.textContent = '📎';
    const name = el('span', 'attach-name');
    name.textContent = att.filename || att.name || 'attachment';
    name.title = att.filename || att.name || '';
    const size = el('span', 'attach-size'); size.textContent = fmtSize(att.size);
    row.appendChild(icon); row.appendChild(name); row.appendChild(size);
    if (att.url) {
      const a = document.createElement('a');
      a.className = 'attach-dl'; a.href = att.url;
      a.download = att.filename || att.name || 'attachment';
      a.textContent = '↓ Download';
      row.appendChild(a);
    }
    section.appendChild(row);
  });
  container.appendChild(section);
}

function injectDarkImages(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (!doc.getElementById('_tmdark')) {
      const s = doc.createElement('style'); s.id = '_tmdark';
      s.textContent = 'img,video{filter:invert(1) hue-rotate(180deg) !important}';
      doc.head.appendChild(s);
    }
  } catch {}
}

function removeDarkImages(iframe) {
  try { const s = iframe.contentDocument.getElementById('_tmdark'); if (s) s.remove(); } catch {}
}

function toggleDark() {
  S.darkEmail = !S.darkEmail;
  const frame = $('emailFrame'), btn = $('darkBtn');
  if (frame) { frame.classList.toggle('dark', S.darkEmail); S.darkEmail ? injectDarkImages(frame) : removeDarkImages(frame); }
  if (btn) btn.classList.toggle('on', S.darkEmail);
}

/* ── Auto refresh ──────────────────────────────────────────────────────── */
function toggleAuto() { S.autoOn ? stopAuto() : startAuto(); }
function startAuto() {
  S.autoOn = true;
  $('autoBtn').classList.add('on');
  S.autoTimer = setInterval(refresh, 5000);
}
function stopAuto() {
  S.autoOn = false;
  const b = $('autoBtn'); if (b) b.classList.remove('on');
  clearInterval(S.autoTimer);
}

/* ── Mobile view ───────────────────────────────────────────────────────── */
function applyMobileView() {
  const mp = $('msgPanel'), vp = $('viewer');
  if (window.innerWidth > 600) {
    mp.classList.remove('hidden'); vp.classList.remove('hidden'); return;
  }
  if (S._mobileView === 'viewer') {
    mp.classList.add('hidden'); vp.classList.remove('hidden');
  } else {
    mp.classList.remove('hidden'); vp.classList.add('hidden');
  }
}
window.addEventListener('resize', applyMobileView);

/* ── Render ────────────────────────────────────────────────────────────── */
function renderAll() {
  renderTabs();
  renderHistory();
  renderMsgList();
  if (!S.selectedMsgId) renderViewer();
  $('mpHeader').style.display = (S.accounts.length || S.historyIdx >= 0) ? 'flex' : 'none';
}

function renderHistory() {
  const wrap = $('archList'), hdr = $('archHdr');
  if (!wrap) return;
  if (!S.history.length) { wrap.style.display = 'none'; hdr.style.display = 'none'; return; }
  hdr.style.display = '';
  if (wrap.style.display === 'none' && S.historyIdx < 0) return;
  wrap.innerHTML = '';
  S.history.forEach((h, i) => {
    const row = el('div', 'acc-row hist-row' + (i === S.historyIdx ? ' active' : ''));
    const addr = el('div', 'acc-email'); addr.textContent = getLabel(h.email); addr.title = h.email;
    const cnt = el('div', 'acc-count'); cnt.textContent = (h.msgs||[]).length;
    cnt.style.display = (h.msgs||[]).length ? '' : 'none';
    cnt.style.background = 'var(--b2)'; cnt.style.color = 'var(--t3)';
    const xBtn = el('button', 'acc-x'); xBtn.textContent = '×'; xBtn.title = 'Remove from archive';
    xBtn.onclick = e => removeHistory(i, e);
    row.appendChild(addr); row.appendChild(cnt); row.appendChild(xBtn);
    row.onclick = () => selectHistory(i);
    wrap.appendChild(row);
  });
}

function renderMsgList() {
  const list = $('msgList');

  // History mode
  if (S.historyIdx >= 0) {
    const h = S.history[S.historyIdx];
    if (!h) { list.innerHTML = ''; return; }
    const msgs = (h.msgs||[]);
    if (!msgs.length) { list.innerHTML = `<div class="empty-inbox"><div class="empty-hint">No messages saved</div></div>`; return; }
    list.innerHTML = '';
    msgs.forEach(msg => {
      const row = el('div', 'msg-row' + (msg.id === S.selectedMsgId ? ' active' : ''));
      const inner = el('div', 'msg-row-inner');
      const from = el('div', 'msg-from'); from.textContent = displayName(msg.from_addr || '');
      const subj = el('div', 'msg-subj'); subj.textContent = msg.subject || '(no subject)';
      const time = el('div', 'msg-time'); time.textContent = rel(msg.created_at);
      inner.appendChild(from); inner.appendChild(subj); inner.appendChild(time);
      row.appendChild(inner);
      row.onclick = () => openMsg(msg.id);
      list.appendChild(row);
    });
    return;
  }

  if (!S.accounts.length) { list.innerHTML = ''; return; }

  let msgs;
  if (S.activeIdx === -1) {
    msgs = S.accounts.flatMap((acct, idx) =>
      acct.msgs.map(m => ({...m, _acctEmail:acct.email, _acctIdx:idx}))
    ).sort((a, b) => {
      const da = isNaN(+a.created_at) ? new Date(a.created_at) : new Date(+a.created_at * 1000);
      const db = isNaN(+b.created_at) ? new Date(b.created_at) : new Date(+b.created_at * 1000);
      return db - da;
    });
  } else {
    const acct = S.accounts[S.activeIdx];
    if (!acct) { list.innerHTML = ''; return; }
    msgs = acct.msgs.map(m => ({...m, _acctEmail:null, _acctIdx:S.activeIdx}));
  }

  // Filter dismissed
  msgs = msgs.filter(m => {
    const email = m._acctEmail || (S.accounts[m._acctIdx]||{}).email;
    return !(S._dismissed[email]||[]).includes(m.id);
  });

  if (!msgs.length) {
    list.innerHTML = `<div class="empty-inbox">
      <div class="empty-art">┌─────────┐\n│         │\n│  empty  │\n│         │\n└─────────┘</div>
      <div class="empty-hint">Waiting for mail…</div>
    </div>`;
    return;
  }

  list.innerHTML = '';
  msgs.forEach(msg => {
    const email = msg._acctEmail || (S.accounts[msg._acctIdx]||{}).email || '';
    const row = el('div', 'msg-row' + (msg.id === S.selectedMsgId ? ' active' : ''));
    const inner = el('div', 'msg-row-inner');
    const from = el('div', 'msg-from'); from.textContent = displayName(msg.from_addr || '');
    const subj = el('div', 'msg-subj'); subj.textContent = msg.subject || '(no subject)';
    if (msg._acctEmail) {
      const acctLbl = el('div', 'msg-acct'); acctLbl.textContent = getLabel(msg._acctEmail);
      inner.appendChild(from); inner.appendChild(subj); inner.appendChild(acctLbl);
    } else {
      inner.appendChild(from); inner.appendChild(subj);
    }
    const time = el('div', 'msg-time'); time.textContent = rel(msg.created_at);
    inner.appendChild(time);

    const xBtn = el('button', 'msg-dismiss'); xBtn.textContent = '×'; xBtn.title = 'Dismiss';
    xBtn.onclick = e => dismissMsg(msg.id, email, e);

    row.appendChild(inner); row.appendChild(xBtn);
    row.onclick = () => openMsg(msg.id, msg._acctIdx);
    list.appendChild(row);
  });
}

function renderViewer() {
  const viewer = $('viewer');
  if (S.historyIdx >= 0) {
    const h = S.history[S.historyIdx];
    viewer.innerHTML = `
      <div class="v-empty">
        <div class="v-empty-logo" style="font-size:12px;color:var(--t3);font-family:var(--mono)">${esc(getLabel(h.email))}</div>
        <div class="v-empty-sub" style="color:var(--t3)">archived · ${fmtDate(h.archivedAt/1000)}</div>
        <div class="v-empty-sub">Select a message to read it</div>
      </div>`;
    return;
  }
  if (!S.accounts.length) {
    viewer.innerHTML = `<div class="v-empty"><div class="v-empty-logo">[tempmail·]</div><div class="v-empty-sub">Generate a mailbox to get started</div></div>`;
    return;
  }
  if (S.activeIdx === -1) {
    viewer.innerHTML = `<div class="v-empty"><div class="v-empty-logo" style="font-size:13px;color:var(--t3);font-family:var(--mono);font-style:italic">all accounts</div><div class="v-empty-sub">Select a message to read it</div></div>`;
    return;
  }
  const acct = S.accounts[S.activeIdx];
  if (!acct) {
    viewer.innerHTML = `<div class="v-empty"><div class="v-empty-logo">[tempmail·]</div><div class="v-empty-sub">Generate a mailbox to get started</div></div>`;
    return;
  }
  viewer.innerHTML = `<div class="v-empty"><div class="v-empty-logo" style="font-size:13px;color:var(--t3);font-family:var(--mono)">${esc(getLabel(acct.email))}</div><div class="v-empty-sub">Select a message to read it</div></div>`;
}

/* ── Toast ─────────────────────────────────────────────────────────────── */
function toast(msg, type = '') {
  const t = el('div', 'toast ' + type); t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 160); }, 2600);
}

/* ── Utils ─────────────────────────────────────────────────────────────── */
function $(id)  { return document.getElementById(id); }
function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }
function enc(s) { return encodeURIComponent(s); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function displayName(s) {
  const m = s.match(/^"?([^"<]+?)"?\s*</);
  return m ? m[1].trim() : s.replace(/<[^>]+>/g,'').trim() || s;
}
function rel(ts) {
  if (!ts) return '';
  const d = isNaN(+ts) ? new Date(ts) : new Date(+ts * 1000);
  const sec = (Date.now() - d) / 1000;
  if (sec < 60)    return `${Math.max(0,Math.floor(sec))}s`;
  if (sec < 3600)  return `${Math.floor(sec/60)}m`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h`;
  return `${Math.floor(sec/86400)}d`;
}
function fmtDate(ts) {
  if (!ts) return '—';
  try {
    const d = isNaN(+ts) ? new Date(ts) : new Date(+ts * 1000);
    return d.toLocaleString(undefined, {dateStyle:'medium', timeStyle:'short'});
  } catch { return '—'; }
}
function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return `${bytes}B`;
  if (bytes < 1048576) return `${(bytes/1024).toFixed(0)}KB`;
  return `${(bytes/1048576).toFixed(1)}MB`;
}

/* ── Copy email ────────────────────────────────────────────────────────── */
function copyEmail(email, elRef, idx) {
  navigator.clipboard.writeText(email).then(() => {
    elRef.classList.add('flash');
    setTimeout(() => elRef.classList.remove('flash'), 900);
    toast('Copied', 'ok');
    selectAccount(idx);
  }).catch(() => toast('Clipboard unavailable', 'err'));
}

let _archOpen = true;
function toggleArchive() {
  const wrap = $('archList'), chev = $('archChev');
  _archOpen = !_archOpen;
  wrap.style.display = _archOpen ? '' : 'none';
  if (chev) chev.style.transform = _archOpen ? '' : 'rotate(-90deg)';
}

/* ── Init ──────────────────────────────────────────────────────────────── */
restore();
renderAll();
checkHealth();
setInterval(checkHealth, 30000);
loadProviders();
loadPinned();
setInterval(loadPinned, 15000);
S.accounts.forEach((_, i) => refreshAccount(i));
startAuto();
applyMobileView();
</script>
